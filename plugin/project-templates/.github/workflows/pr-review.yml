# Workflow: pr-review
# Trigger: PR opened/updated on master.
# Role: Run three reviewer agents in parallel. None approves.

name: PR Review

on:
  workflow_dispatch:
    inputs:
      pull_request_id:
        description: 'Pull request number to review'
        required: true
        type: string
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/designs/**"

env:
  ADO_PAT: ${{ secrets.ADO_PAT }}

jobs:
  review:
    name: ${{ matrix.agent }} review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: code-reviewer
            label: Code Review
          - agent: security-auditor
            label: Security Review
          - agent: tech-debt-auditor
            label: Tech Debt Review

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pull_request_id || github.event.pull_request.number }}"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER)
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}" || true
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}" || true
          npm install -g @github/copilot
          copilot plugin install --from https://github.com/deepu-roy/ai-sdlc-orchestrator

      - name: Run ${{ matrix.label }}
        run: |
          copilot \
            --model claude-sonnet-4.6 \
            --allow-all \
            --no-ask-user \
            --agent "${{ matrix.agent }}" \
            --prompt "Review PR #${{ steps.pr.outputs.number }} on branch ${{ steps.pr.outputs.head_ref }}. Run git diff origin/master...HEAD and post your findings as PR comments. Return your JSON summary at the end." \
            2>&1 | tee "copilot-output-${{ matrix.agent }}.log"
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          CLAUDE_RUN_ID: "${{ github.run_id }}-${{ matrix.agent }}"

      - name: Archive run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-${{ matrix.agent }}-${{ steps.pr.outputs.number }}
          path: copilot-output-${{ matrix.agent }}.log
          retention-days: 90
          if-no-files-found: ignore
